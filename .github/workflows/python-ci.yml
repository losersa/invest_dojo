# InvestDojo · Python 服务 CI
#
# 触发：
#   - 推送到 main / 特性分支
#   - PR 到 main
#   - python-services/ 下文件变动时才跑
#
# 检查项：
#   1. ruff lint
#   2. ruff format 未变
#   3. mypy 类型（warn 模式，不阻塞）
#   4. pytest 单元测试（只跑非 integration 的）
#   5. 冒烟测试（启动 5 服务 + 验证端点）
#
# 对应文档：docs/product/99_MVP_Sprint0.md · T-0.04
name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "investdojo/python-services/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "investdojo/python-services/**"
      - ".github/workflows/python-ci.yml"
  workflow_dispatch:  # 手动触发

defaults:
  run:
    working-directory: investdojo/python-services

jobs:
  lint-and-test:
    name: Lint + Typecheck + Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: investdojo/python-services/uv.lock

      - name: 设置 Python
        run: uv python install 3.12

      - name: 安装依赖
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format 检查
        run: uv run ruff format --check .

      - name: Mypy 类型检查（warn 模式）
        continue-on-error: true  # MVP 阶段不阻塞
        run: uv run mypy common --ignore-missing-imports

      - name: 单元测试
        env:
          PYTHONPATH: "."
          # 不配 Supabase key，integration 测试自动跳过
          SUPABASE_SERVICE_ROLE_KEY: ""
          ENV: test
          LOG_FORMAT: json
        run: uv run pytest -v -m "not integration"

  smoke:
    name: 服务冒烟测试
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # 注意：基础的 /health（liveness）不连 Redis/MinIO/Supabase，
    # 所以 smoke 测试不需要起基础设施 service container。
    # /health/ready（readiness）需要外部依赖，但我们暂不在 CI 里验证它。

    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: investdojo/python-services/uv.lock

      - name: 设置 Python
        run: uv python install 3.12

      - name: 安装依赖
        run: uv sync --frozen

      - name: 启动服务 + 验证端点
        env:
          PYTHONPATH: "."
          # 空 key，/health 不需要
          SUPABASE_SERVICE_ROLE_KEY: ""
          ENV: test
          LOG_FORMAT: json
        run: |
          # 启动 6 个服务（data + feature + train + infer + backtest + monitor）
          # 注意 data-svc 用端口 8000（T-1.07 新增）
          declare -A PORTS=(
            [data]=8000
            [feature]=8001
            [train]=8002
            [infer]=8003
            [backtest]=8004
            [monitor]=8005
          )
          for svc in "${!PORTS[@]}"; do
            port=${PORTS[$svc]}
            uv run uvicorn main:app \
              --app-dir "${svc}-svc" \
              --host 127.0.0.1 \
              --port $port \
              --log-level warning &
            echo "started $svc on :$port (PID=$!)"
          done

          # 等待就绪
          sleep 5

          # 验证 /health
          for port in 8000 8001 8002 8003 8004 8005; do
            echo "=== :$port /health ==="
            curl -sf --retry 3 --retry-delay 1 http://localhost:$port/health
            echo ""
          done

          # 验证 /docs
          for port in 8000 8001 8002 8003 8004 8005; do
            code=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:$port/docs)
            if [ "$code" != "200" ]; then
              echo "❌ :$port/docs 返回 $code"
              exit 1
            fi
          done

          echo "✅ 冒烟测试通过（6 个 svc 全部健康）"
