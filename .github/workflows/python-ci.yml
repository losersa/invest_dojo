# InvestDojo · Python 服务 CI
#
# 触发：
#   - 推送到 main / 特性分支
#   - PR 到 main
#   - python-services/ 下文件变动时才跑
#
# 检查项：
#   1. ruff lint
#   2. ruff format 未变
#   3. mypy 类型（warn 模式，不阻塞）
#   4. pytest 单元测试（只跑非 integration 的）
#   5. 冒烟测试（启动 5 服务 + 验证端点）
#
# 对应文档：docs/product/99_MVP_Sprint0.md · T-0.04
name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "investdojo/python-services/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "investdojo/python-services/**"
      - ".github/workflows/python-ci.yml"
  workflow_dispatch:  # 手动触发

defaults:
  run:
    working-directory: investdojo/python-services

jobs:
  lint-and-test:
    name: Lint + Typecheck + Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: investdojo/python-services/uv.lock

      - name: 设置 Python
        run: uv python install 3.12

      - name: 安装依赖
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format 检查
        run: uv run ruff format --check .

      - name: Mypy 类型检查（warn 模式）
        continue-on-error: true  # MVP 阶段不阻塞
        run: uv run mypy common --ignore-missing-imports

      - name: 单元测试
        env:
          PYTHONPATH: "."
          # 不配 Supabase key，integration 测试自动跳过
          SUPABASE_SERVICE_ROLE_KEY: ""
          ENV: test
          LOG_FORMAT: json
        run: uv run pytest -v -m "not integration"

  smoke:
    name: 服务冒烟测试
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # 需要真实的 Redis + MinIO 才能测 /health/ready
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: bitnami/minio:latest
        ports:
          - "9000:9000"
          - "9001:9001"
        env:
          MINIO_ROOT_USER: investdojo
          MINIO_ROOT_PASSWORD: investdojo_dev_only
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: investdojo/python-services/uv.lock

      - name: 设置 Python
        run: uv python install 3.12

      - name: 安装依赖
        run: uv sync --frozen

      - name: 启动服务 + 验证端点
        env:
          PYTHONPATH: "."
          REDIS_URL: redis://localhost:6379/0
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ROOT_USER: investdojo
          MINIO_ROOT_PASSWORD: investdojo_dev_only
          # 服务启动时会试图连 Supabase，但用空 key 健康检查会 warn 而非 crash
          SUPABASE_SERVICE_ROLE_KEY: ""
          ENV: test
          LOG_FORMAT: json
        run: |
          # 不用 scripts/smoke.sh（依赖 docker-compose 基础设施）
          # 直接启动服务 + 检查 /health（不检查 /health/ready，因为无 Supabase）
          for svc in feature train infer backtest monitor; do
            port=$(python3 -c "
          ports = {'feature': 8001, 'train': 8002, 'infer': 8003, 'backtest': 8004, 'monitor': 8005}
          print(ports['$svc'])
          ")
            uv run uvicorn main:app \
              --app-dir "${svc}-svc" \
              --host 127.0.0.1 \
              --port $port \
              --log-level warning &
            echo "started $svc on :$port (PID=$!)"
          done
          
          # 等待就绪
          sleep 5
          
          for port in 8001 8002 8003 8004 8005; do
            echo "=== :$port ==="
            curl -sf --retry 3 --retry-delay 1 http://localhost:$port/health
            echo ""
          done
          
          # 确保 /docs 也能访问
          for port in 8001 8002 8003 8004 8005; do
            code=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:$port/docs)
            if [ "$code" != "200" ]; then
              echo "❌ :$port/docs 返回 $code"
              exit 1
            fi
          done
          
          echo "✅ 冒烟测试通过"
