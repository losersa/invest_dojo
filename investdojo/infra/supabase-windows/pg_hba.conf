# ═══════════════════════════════════════════════════════════════════
# InvestDojo · pg_hba.conf · 客户端认证规则
# ═══════════════════════════════════════════════════════════════════
# 部署位置：E:\investdojo\data\db-config\pg_hba.conf
# 容器内路径：/etc/postgresql-custom/pg_hba.conf
#
# 规则顺序从上到下匹配，越具体的写越前面。
#
# 🔐 安全提示：
#   - 第 4 条是"局域网放行"，默认放行 192.168.0.0/16 和 10.0.0.0/8
#   - 如果你的局域网是其它段（例如 172.20.x.x），请修改第 4 条
#   - 千万不要写 0.0.0.0/0（开到公网），局域网访问靠 Windows 防火墙兜底
# ═══════════════════════════════════════════════════════════════════

# TYPE   DATABASE     USER            ADDRESS                 METHOD

# 1) Unix socket：容器内 Supabase 各服务之间走信任
local    all          all                                     trust

# 2) 容器内部回环（PostgREST / Auth / Realtime 等）
host     all          all             127.0.0.1/32            trust
host     all          all             ::1/128                 trust

# 3) Docker 默认 bridge / WSL2 子网（容器间通信）
host     all          all             172.16.0.0/12           scram-sha-256
host     all          all             10.0.0.0/8              scram-sha-256

# 4) 局域网访问（Mac 远程连接）
#    家用路由器常见两段都放开：192.168.x.x / 10.x.x.x
#    （10.0.0.0/8 已在上面覆盖）
host     all          all             192.168.0.0/16          scram-sha-256

# 5) 复制连接（本地备份用；如果不用逻辑复制可以删）
host     replication  postgres        127.0.0.1/32            scram-sha-256
host     replication  postgres        172.16.0.0/12           scram-sha-256

# 6) 其他一律拒绝（显式拒绝比 fallback 更清楚）
host     all          all             0.0.0.0/0               reject
host     all          all             ::/0                    reject
