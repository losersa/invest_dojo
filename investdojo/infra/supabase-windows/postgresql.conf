# ═══════════════════════════════════════════════════════════════════
# InvestDojo · Postgres 性能调优（Windows 宿主 · WSL2 12GB 内存）
# ═══════════════════════════════════════════════════════════════════
# 部署位置：E:\investdojo\data\db-config\postgresql.conf
# 容器内路径：/etc/postgresql-custom/postgresql.conf
# 被 docker-compose.override.yml 的 command 引用
#
# 参数依据：
#   - 假设给 WSL2 12 GB 内存 → 容器内 Postgres 可用 ~8 GB
#   - 读密集（K 线/因子值扫描）> 写密集 → shared_buffers 大 + work_mem 大
#   - feature_values 分区表（未来 15 亿行）需要更大的 maintenance_work_mem
# ═══════════════════════════════════════════════════════════════════

# ── 基础 ──
listen_addresses = '*'
port = 5432
max_connections = 200

# ── 内存 ──
shared_buffers = 2GB                    # 25% of container RAM
effective_cache_size = 6GB              # 给 planner 参考的 OS 缓存
work_mem = 32MB                         # 单 sort/hash 的内存（200 connections × 32MB 上限可控）
maintenance_work_mem = 512MB            # VACUUM / CREATE INDEX / 分区 attach
temp_buffers = 16MB

# ── WAL ──
wal_level = logical                      # Supabase realtime 需要
max_wal_size = 2GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9
wal_compression = on

# ── Windows/WSL2 写盘优化 ──
# 本地开发库，如果宕机最多丢最近几秒数据；严肃生产要改回 on
synchronous_commit = off
fsync = on                               # 不要关，关了数据会真的丢
full_page_writes = on

# ── 并行查询（适合全表扫描大表）──
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# ── 计划器 ──
random_page_cost = 1.1                  # SSD
effective_io_concurrency = 200          # SSD

# ── 日志（开发阶段调高）──
log_min_duration_statement = 500        # 超过 500ms 的查询记日志，方便优化
log_line_prefix = '%t [%p] %q%u@%d '
log_checkpoints = on
log_connections = off                   # 连接多时刷屏，关掉
log_disconnections = off
log_lock_waits = on
log_statement = 'none'                  # 'ddl' 或 'all' 按需打开

# ── 统计 ──
track_io_timing = on
track_functions = pl

# ── Supabase 官方必需扩展支持 ──
shared_preload_libraries = 'pg_stat_statements,pgaudit,plpgsql,plpgsql_check,pg_cron,pg_net,timescaledb,auto_explain,pg_tle,plan_filter,supabase_vault'

# ── 自动 VACUUM（写入量大时必须）──
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ── 时区 ──
timezone = 'Asia/Shanghai'
log_timezone = 'Asia/Shanghai'
datestyle = 'iso, ymd'
