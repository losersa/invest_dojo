# ===============================================================
# Kong declarative config - InvestDojo Supabase Lite
# ===============================================================
# Kong only does routing + CORS in this lite setup.
# Authorization/RLS is handled downstream by PostgREST & GoTrue
# based on the JWT passed in the Authorization / apikey header.
#
# Routes:
#   /rest/v1/*  -> PostgREST
#   /auth/v1/*  -> GoTrue
#
# Same URL layout as Supabase Cloud, so client code (SupabaseClient,
# @supabase/ssr) needs zero changes.
# ===============================================================

_format_version: "3.0"
_transform: true

services:

  # ---- PostgREST ------------------------------------------------
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
          headers:
            - Accept
            - Accept-Version
            - Authorization
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - X-Auth-Token
            - apikey
            - prefer
            - range
            - range-unit
          exposed_headers:
            - content-range
            - content-length
          credentials: true
          max_age: 3600

  # ---- GoTrue (Auth) -------------------------------------------
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - X-Client-Info
          credentials: true
          max_age: 3600
