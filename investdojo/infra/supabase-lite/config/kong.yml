# ===============================================================
# Kong declarative config - InvestDojo Supabase Lite
# ===============================================================
_format_version: "3.0"
_transform: true

services:

  # ---- PostgREST ------------------------------------------------
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://127.0.0.1:3000"
            - "http://192.168.1.3:3000"
            - "http://localhost:8000"
            - "http://127.0.0.1:8000"
            - "http://192.168.1.3:8000"
          methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
          headers:
            - Accept
            - Accept-Version
            - Authorization
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - X-Auth-Token
            - apikey
            - prefer
            - range
            - range-unit
            - X-Client-Info
            - X-Supabase-Api-Version
          exposed_headers:
            - content-range
            - content-length
          credentials: true
          max_age: 3600

  # ---- GoTrue (Auth) -------------------------------------------
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://127.0.0.1:3000"
            - "http://192.168.1.3:3000"
            - "http://localhost:8000"
            - "http://127.0.0.1:8000"
            - "http://192.168.1.3:8000"
          methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - X-Client-Info
            - X-Supabase-Api-Version
          credentials: true
          max_age: 3600
